name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f gradlew ]; then
            echo "📦 Downloading Gradle to generate wrapper..."
            curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
            unzip -q gradle.zip
            ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          fi
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Go-APK
          path: app/build/outputs/apk/release/app-release.apk
